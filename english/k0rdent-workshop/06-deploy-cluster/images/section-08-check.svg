<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <rect width="640" height="160" fill="#0d1117" rx="10" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="638" height="28" rx="10" fill="#161b22"/>
  <rect x="1" y="20" width="638" height="9" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#f0883e" opacity="0.8"/>
  <circle cx="50" cy="14" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="320" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Deploy Cluster — Knowledge Check</text>
  <!-- Deployment flow -->
  <rect x="30" y="50" width="100" height="30" fill="#161b22" stroke="#58a6ff" stroke-width="1" rx="3"/>
  <text x="80" y="70" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff">ClusterDeployment</text>
  <line x1="130" y1="65" x2="165" y2="65" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#58a6ff"/></marker></defs>
  <rect x="165" y="50" width="100" height="30" fill="#161b22" stroke="#3fb950" stroke-width="1" rx="3"/>
  <text x="215" y="70" text-anchor="middle" font-family="monospace" font-size="9" fill="#3fb950">Provisioning...</text>
  <line x1="265" y1="65" x2="300" y2="65" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="300" y="50" width="100" height="30" fill="#161b22" stroke="#3fb950" stroke-width="1" rx="3"/>
  <text x="350" y="70" text-anchor="middle" font-family="monospace" font-size="9" fill="#3fb950">READY: True ✓</text>
  <line x1="400" y1="65" x2="435" y2="65" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="435" y="50" width="110" height="30" fill="#161b22" stroke="#58a6ff" stroke-width="1" rx="3"/>
  <text x="490" y="65" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff">kubeconfig Secret</text>
  <text x="490" y="77" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">&lt;name&gt;-kubeconfig</text>
  <!-- dryRun note -->
  <rect x="100" y="105" width="440" height="22" fill="#1f2937" stroke="#f0883e" stroke-width="1" rx="3"/>
  <text x="320" y="120" text-anchor="middle" font-family="monospace" font-size="9" fill="#f0883e">dryRun: true → validate config without provisioning real resources</text>
  <text x="320" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff" opacity="0.5">$ kubectl get ClusterDeployments -A → lists all managed clusters</text>
</svg>
