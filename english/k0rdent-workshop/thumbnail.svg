<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800">
  <style>
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes floatUD { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
  @keyframes floatUD2 { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-4px); } }
  @keyframes pulseGlow { 0%,100% { opacity:1; filter: drop-shadow(0 0 2px currentColor); } 50% { opacity:0.7; filter: drop-shadow(0 0 8px currentColor); } }
  @keyframes slideInL { from { opacity:0; transform: translateX(-20px); } to { opacity:1; transform: translateX(0); } }
  @keyframes slideInR { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
  @keyframes slideInU { from { opacity:0; transform: translateY(15px); } to { opacity:1; transform: translateY(0); } }
  @keyframes dashFlow { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
  @keyframes scaleIn { from { opacity:0; transform: scale(0.85); } to { opacity:1; transform: scale(1); } }
  @keyframes shimmer { 0%,100% { opacity:0.6; } 50% { opacity:1; } }

  svg { animation: fadeIn 0.8s ease-out both; }

  /* Kubernetes wheel rotation */
  .k8s-wheel, [id*="wheel"], [id*="k8s"] {
    transform-origin: center center;
    animation: spinSlow 12s linear infinite;
  }

  /* Container boxes float */
  .container-box { animation: floatUD 3s ease-in-out infinite; }
  .container-box:nth-child(2) { animation-delay: 0.5s; }
  .container-box:nth-child(3) { animation-delay: 1s; }
  .container-box:nth-child(4) { animation-delay: 1.5s; }

  /* Node circles pulse */
  .node-circle { animation: pulseGlow 2.5s ease-in-out infinite; }

  /* Arrows animate */
  .flow-arrow { stroke-dasharray: 8 4; animation: dashFlow 1.5s linear infinite; }

  /* Section headers slide in */
  .section-title { animation: slideInL 0.6s ease-out 0.3s both; }

  /* Status items appear sequentially */
  .status-item { animation: slideInU 0.5s ease-out both; }
  .status-item:nth-child(1) { animation-delay: 0.1s; }
  .status-item:nth-child(2) { animation-delay: 0.2s; }
  .status-item:nth-child(3) { animation-delay: 0.3s; }
  .status-item:nth-child(4) { animation-delay: 0.4s; }
  .status-item:nth-child(5) { animation-delay: 0.5s; }

  /* Terminal cursor blink */
  .cursor { animation: blink 1s step-end infinite; }

  /* Badges scale in */
  .badge { animation: scaleIn 0.4s ease-out both; }

  /* Labels shimmer */
  .label-text { animation: shimmer 3s ease-in-out infinite; }
</style>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect x="240" y="80" width="800" height="640" fill="white" fill-opacity="0.04" rx="32"/>

  <!-- Management Cluster (center) -->
  <circle cx="640" cy="340" r="90" fill="url(#glow)" stroke="#58a6ff" stroke-width="2"/>
  <text x="640" y="334" text-anchor="middle" font-family="monospace" font-size="16" fill="#58a6ff" font-weight="bold">Management</text>
  <text x="640" y="356" text-anchor="middle" font-family="monospace" font-size="14" fill="#8b949e">Cluster</text>

  <!-- Connector lines to child clusters -->
  <g class="flow-arrow"><line x1="570" y1="290" x2="430" y2="200" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,3"/></g>
  <g class="flow-arrow"><line x1="710" y1="290" x2="850" y2="200" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,3"/></g>
  <g class="flow-arrow"><line x1="570" y1="390" x2="430" y2="480" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,3"/></g>
  <g class="flow-arrow"><line x1="710" y1="390" x2="850" y2="480" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,3"/></g>

  <!-- Child clusters -->
  <circle cx="390" cy="170" r="52" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="390" y="164" text-anchor="middle" font-family="monospace" font-size="11" fill="#3fb950">dev-01</text>
  <text x="390" y="180" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">k0s</text>

  <circle cx="890" cy="170" r="52" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="890" y="164" text-anchor="middle" font-family="monospace" font-size="11" fill="#3fb950">prod-01</text>
  <text x="890" y="180" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">k0s</text>

  <circle cx="390" cy="510" r="52" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="390" y="504" text-anchor="middle" font-family="monospace" font-size="11" fill="#f0883e">staging</text>
  <text x="390" y="520" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">k0s</text>

  <circle cx="890" cy="510" r="52" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="890" y="504" text-anchor="middle" font-family="monospace" font-size="11" fill="#f0883e">edge-01</text>
  <text x="890" y="520" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">k0s</text>

  <!-- Title -->
  <text x="640" y="620" text-anchor="middle" font-family="system-ui,sans-serif" font-size="72" font-weight="700" fill="#58a6ff">k0rdent</text>
  <text x="640" y="680" text-anchor="middle" font-family="system-ui,sans-serif" font-size="36" fill="#8b949e">Workshop</text>
  <text x="640" y="730" text-anchor="middle" font-family="monospace" font-size="20" fill="#3fb950">12 Lessons · Open Learn</text>
</svg>
