<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <style>
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes floatUD { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
  @keyframes floatUD2 { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-4px); } }
  @keyframes pulseGlow { 0%,100% { opacity:1; filter: drop-shadow(0 0 2px currentColor); } 50% { opacity:0.7; filter: drop-shadow(0 0 8px currentColor); } }
  @keyframes slideInL { from { opacity:0; transform: translateX(-20px); } to { opacity:1; transform: translateX(0); } }
  @keyframes slideInR { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
  @keyframes slideInU { from { opacity:0; transform: translateY(15px); } to { opacity:1; transform: translateY(0); } }
  @keyframes dashFlow { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
  @keyframes scaleIn { from { opacity:0; transform: scale(0.85); } to { opacity:1; transform: scale(1); } }
  @keyframes shimmer { 0%,100% { opacity:0.6; } 50% { opacity:1; } }

  svg { animation: fadeIn 0.8s ease-out both; }

  /* Kubernetes wheel rotation */
  .k8s-wheel, [id*="wheel"], [id*="k8s"] {
    transform-origin: center center;
    animation: spinSlow 12s linear infinite;
  }

  /* Container boxes float */
  .container-box { animation: floatUD 3s ease-in-out infinite; }
  .container-box:nth-child(2) { animation-delay: 0.5s; }
  .container-box:nth-child(3) { animation-delay: 1s; }
  .container-box:nth-child(4) { animation-delay: 1.5s; }

  /* Node circles pulse */
  .node-circle { animation: pulseGlow 2.5s ease-in-out infinite; }

  /* Arrows animate */
  .flow-arrow { stroke-dasharray: 8 4; animation: dashFlow 1.5s linear infinite; }

  /* Section headers slide in */
  .section-title { animation: slideInL 0.6s ease-out 0.3s both; }

  /* Status items appear sequentially */
  .status-item { animation: slideInU 0.5s ease-out both; }
  .status-item:nth-child(1) { animation-delay: 0.1s; }
  .status-item:nth-child(2) { animation-delay: 0.2s; }
  .status-item:nth-child(3) { animation-delay: 0.3s; }
  .status-item:nth-child(4) { animation-delay: 0.4s; }
  .status-item:nth-child(5) { animation-delay: 0.5s; }

  /* Terminal cursor blink */
  .cursor { animation: blink 1s step-end infinite; }

  /* Badges scale in */
  .badge { animation: scaleIn 0.4s ease-out both; }

  /* Labels shimmer */
  .label-text { animation: shimmer 3s ease-in-out infinite; }
</style>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" rx="12"/>

  <!-- Central k0rdent circle -->
  <circle cx="320" cy="160" r="70" fill="#161b22" stroke="#58a6ff" stroke-width="2.5"/>
  <text x="320" y="155" text-anchor="middle" font-family="monospace" font-size="18" fill="#58a6ff" font-weight="bold">k0rdent</text>
  <text x="320" y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">super control plane</text>

  <!-- KCM -->
  <circle cx="160" cy="80" r="38" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="160" y="76" text-anchor="middle" font-family="monospace" font-size="11" fill="#3fb950" font-weight="bold">KCM</text>
  <text x="160" y="91" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Cluster Mgr</text>
  <line x1="196" y1="105" x2="255" y2="135" stroke="#30363d" stroke-width="1.5"/>

  <!-- KSM -->
  <circle cx="480" cy="80" r="38" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="480" y="76" text-anchor="middle" font-family="monospace" font-size="11" fill="#f0883e" font-weight="bold">KSM</text>
  <text x="480" y="91" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">State Mgr</text>
  <line x1="444" y1="105" x2="385" y2="135" stroke="#30363d" stroke-width="1.5"/>

  <!-- KOF -->
  <circle cx="320" cy="270" r="38" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="320" y="266" text-anchor="middle" font-family="monospace" font-size="11" fill="#bc8cff" font-weight="bold">KOF</text>
  <text x="320" y="281" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Observability</text>
  <line x1="320" y1="232" x2="320" y2="248" stroke="#30363d" stroke-width="1.5"/>

  <text x="320" y="340" text-anchor="middle" font-family="monospace" font-size="13" fill="#58a6ff" fill-opacity="0.8">Welcome to k0rdent</text>
</svg>
