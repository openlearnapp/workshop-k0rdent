<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <rect width="640" height="160" fill="#0d1117" rx="10" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="638" height="28" rx="10" fill="#161b22"/>
  <rect x="1" y="20" width="638" height="9" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#f0883e" opacity="0.8"/>
  <circle cx="50" cy="14" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="320" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Custom Templates — Knowledge Check</text>
  <!-- Blueprint / custom template build flow -->
  <text x="50" y="58" font-family="monospace" font-size="10" fill="#8b949e">1. Modify Helm chart (values.yaml + Chart.yaml)</text>
  <text x="50" y="76" font-family="monospace" font-size="10" fill="#8b949e">2. helm package ./my-custom-template</text>
  <text x="50" y="94" font-family="monospace" font-size="10" fill="#8b949e">3. helm push ... oci://registry.example.com/</text>
  <text x="50" y="112" font-family="monospace" font-size="10" fill="#8b949e">4. Apply HelmRepository + ClusterTemplate CRD</text>
  <!-- VALID indicator -->
  <rect x="450" y="50" width="160" height="32" fill="#161b22" stroke="#3fb950" stroke-width="1.5" rx="4"/>
  <text x="530" y="65" text-anchor="middle" font-family="monospace" font-size="10" fill="#3fb950">VALID: true ✓</text>
  <text x="530" y="78" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">custom template ready</text>
  <rect x="450" y="95" width="160" height="22" fill="#1f2937" stroke="#f0883e" stroke-width="1" rx="3"/>
  <text x="530" y="110" text-anchor="middle" font-family="monospace" font-size="8" fill="#f0883e">VALID: false → check validationError</text>
  <text x="320" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff" opacity="0.5">$ kubectl get clustertemplate custom-template -n kcm-system</text>
</svg>
