<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
<style>
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes floatUD { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
  @keyframes floatUD2 { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-4px); } }
  @keyframes pulseGlow { 0%,100% { opacity:1; filter: drop-shadow(0 0 2px currentColor); } 50% { opacity:0.7; filter: drop-shadow(0 0 8px currentColor); } }
  @keyframes slideInL { from { opacity:0; transform: translateX(-20px); } to { opacity:1; transform: translateX(0); } }
  @keyframes slideInR { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
  @keyframes slideInU { from { opacity:0; transform: translateY(15px); } to { opacity:1; transform: translateY(0); } }
  @keyframes dashFlow { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
  @keyframes scaleIn { from { opacity:0; transform: scale(0.85); } to { opacity:1; transform: scale(1); } }
  @keyframes shimmer { 0%,100% { opacity:0.6; } 50% { opacity:1; } }

  svg { animation: fadeIn 0.8s ease-out both; }

  /* Kubernetes wheel rotation */
  .k8s-wheel, [id*="wheel"], [id*="k8s"] {
    transform-origin: center center;
    animation: spinSlow 12s linear infinite;
  }

  /* Container boxes float */
  .container-box { animation: floatUD 3s ease-in-out infinite; }
  .container-box:nth-child(2) { animation-delay: 0.5s; }
  .container-box:nth-child(3) { animation-delay: 1s; }
  .container-box:nth-child(4) { animation-delay: 1.5s; }

  /* Node circles pulse */
  .node-circle { animation: pulseGlow 2.5s ease-in-out infinite; }

  /* Arrows animate */
  .flow-arrow { stroke-dasharray: 8 4; animation: dashFlow 1.5s linear infinite; }

  /* Section headers slide in */
  .section-title { animation: slideInL 0.6s ease-out 0.3s both; }

  /* Status items appear sequentially */
  .status-item { animation: slideInU 0.5s ease-out both; }
  .status-item:nth-child(1) { animation-delay: 0.1s; }
  .status-item:nth-child(2) { animation-delay: 0.2s; }
  .status-item:nth-child(3) { animation-delay: 0.3s; }
  .status-item:nth-child(4) { animation-delay: 0.4s; }
  .status-item:nth-child(5) { animation-delay: 0.5s; }

  /* Terminal cursor blink */
  .cursor { animation: blink 1s step-end infinite; }

  /* Badges scale in */
  .badge { animation: scaleIn 0.4s ease-out both; }

  /* Labels shimmer */
  .label-text { animation: shimmer 3s ease-in-out infinite; }
</style>
  <rect width="640" height="160" fill="#0d1117" rx="10" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="638" height="28" rx="10" fill="#161b22"/>
  <rect x="1" y="20" width="638" height="9" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#f0883e" opacity="0.8"/>
  <circle cx="50" cy="14" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="320" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Kubernetes — The Harbour Master</text>

  <!-- Control Plane -->
  <rect x="20" y="42" width="140" height="100" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" rx="4"/>
  <text x="90" y="58" text-anchor="middle" font-family="monospace" font-size="10" fill="#58a6ff" font-weight="bold">Control Plane</text>
  <text x="90" y="76" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">API Server</text>
  <text x="90" y="90" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Scheduler</text>
  <text x="90" y="104" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">etcd</text>
  <text x="90" y="118" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Controller Mgr</text>
  <text x="90" y="134" text-anchor="middle" font-family="monospace" font-size="8" fill="#58a6ff">the brain</text>

  <!-- Arrows -->
  <g class="flow-arrow"><line x1="160" y1="92" x2="200" y2="92" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,2"/></g>

  <!-- Node 1 -->
  <rect x="200" y="42" width="120" height="46" fill="#161b22" stroke="#3fb950" stroke-width="1" rx="3"/>
  <text x="260" y="57" text-anchor="middle" font-family="monospace" font-size="9" fill="#3fb950">Node 1</text>
  <rect x="210" y="62" width="30" height="18" fill="#1f6feb" class="container-box" rx="2"/>
  <text x="225" y="74" text-anchor="middle" font-family="monospace" font-size="7" fill="white">Pod</text>
  <rect x="248" y="62" width="30" height="18" fill="#238636" class="container-box" rx="2"/>
  <text x="263" y="74" text-anchor="middle" font-family="monospace" font-size="7" fill="white">Pod</text>
  <rect x="286" y="62" width="24" height="18" fill="#b56800" class="container-box" rx="2"/>
  <text x="298" y="74" text-anchor="middle" font-family="monospace" font-size="7" fill="white">Pod</text>

  <!-- Node 2 -->
  <rect x="200" y="96" width="120" height="46" fill="#161b22" stroke="#3fb950" stroke-width="1" rx="3"/>
  <text x="260" y="111" text-anchor="middle" font-family="monospace" font-size="9" fill="#3fb950">Node 2</text>
  <rect x="210" y="116" width="30" height="18" fill="#1f6feb" class="container-box" rx="2"/>
  <text x="225" y="128" text-anchor="middle" font-family="monospace" font-size="7" fill="white">Pod</text>
  <rect x="248" y="116" width="30" height="18" fill="#238636" class="container-box" rx="2"/>
  <text x="263" y="128" text-anchor="middle" font-family="monospace" font-size="7" fill="white">Pod</text>

  <!-- Commands -->
  <text x="350" y="55" font-family="monospace" font-size="12" fill="#3fb950">$ kubectl get pods</text>
