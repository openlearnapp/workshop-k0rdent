  <text x="350" y="104" font-family="monospace" font-size="10" fill="#58a6ff">app-9k2ms   1/1   Running</text>
  <text x="350" y="120" font-family="monospace" font-size="10" fill="#58a6ff">db-3xp91    1/1   Running</text>
  <text x="350" y="140" font-family="monospace" font-size="10" fill="#3fb950">$ kubectl get nodes</text>
</svg>
