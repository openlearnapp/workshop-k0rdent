<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
<style>
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes floatUD { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
  @keyframes floatUD2 { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-4px); } }
  @keyframes pulseGlow { 0%,100% { opacity:1; filter: drop-shadow(0 0 2px currentColor); } 50% { opacity:0.7; filter: drop-shadow(0 0 8px currentColor); } }
  @keyframes slideInL { from { opacity:0; transform: translateX(-20px); } to { opacity:1; transform: translateX(0); } }
  @keyframes slideInR { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
  @keyframes slideInU { from { opacity:0; transform: translateY(15px); } to { opacity:1; transform: translateY(0); } }
  @keyframes dashFlow { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
  @keyframes scaleIn { from { opacity:0; transform: scale(0.85); } to { opacity:1; transform: scale(1); } }
  @keyframes shimmer { 0%,100% { opacity:0.6; } 50% { opacity:1; } }

  svg { animation: fadeIn 0.8s ease-out both; }

  /* Kubernetes wheel rotation */
  .k8s-wheel, [id*="wheel"], [id*="k8s"] {
    transform-origin: center center;
    animation: spinSlow 12s linear infinite;
  }

  /* Container boxes float */
  .container-box { animation: floatUD 3s ease-in-out infinite; }
  .container-box:nth-child(2) { animation-delay: 0.5s; }
  .container-box:nth-child(3) { animation-delay: 1s; }
  .container-box:nth-child(4) { animation-delay: 1.5s; }

  /* Node circles pulse */
  .node-circle { animation: pulseGlow 2.5s ease-in-out infinite; }

  /* Arrows animate */
  .flow-arrow { stroke-dasharray: 8 4; animation: dashFlow 1.5s linear infinite; }

  /* Section headers slide in */
  .section-title { animation: slideInL 0.6s ease-out 0.3s both; }

  /* Status items appear sequentially */
  .status-item { animation: slideInU 0.5s ease-out both; }
  .status-item:nth-child(1) { animation-delay: 0.1s; }
  .status-item:nth-child(2) { animation-delay: 0.2s; }
  .status-item:nth-child(3) { animation-delay: 0.3s; }
  .status-item:nth-child(4) { animation-delay: 0.4s; }
  .status-item:nth-child(5) { animation-delay: 0.5s; }

  /* Terminal cursor blink */
  .cursor { animation: blink 1s step-end infinite; }

  /* Badges scale in */
  .badge { animation: scaleIn 0.4s ease-out both; }

  /* Labels shimmer */
  .label-text { animation: shimmer 3s ease-in-out infinite; }
</style>
  <rect width="640" height="160" fill="#0d1117" rx="10" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="638" height="28" rx="10" fill="#161b22"/>
  <rect x="1" y="20" width="638" height="9" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#f0883e" opacity="0.8"/>
  <circle cx="50" cy="14" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="320" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Kubernetes Architecture</text>

  <!-- Control Plane box -->
  <rect x="20" y="40" width="240" height="50" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" rx="4"/>
  <text x="25" y="55" font-family="monospace" font-size="9" fill="#58a6ff">Control Plane:</text>
  <text x="25" y="70" font-family="monospace" font-size="8" fill="#8b949e">API Server  |  etcd  |  Scheduler  |  Controller Mgr</text>
  <text x="25" y="82" font-family="monospace" font-size="8" fill="#58a6ff">→ makes all decisions</text>

  <!-- Arrow down -->
  <line x1="140" y1="90" x2="140" y2="108" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="135,104 140,112 145,104" fill="#30363d"/>

  <!-- Worker Nodes row -->
  <rect x="20" y="110" width="70" height="36" fill="#161b22" stroke="#3fb950" stroke-width="1" rx="3"/>
  <text x="55" y="124" text-anchor="middle" font-family="monospace" font-size="8" fill="#3fb950">Node 1</text>
  <text x="55" y="138" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">kubelet</text>

  <rect x="100" y="110" width="70" height="36" fill="#161b22" stroke="#3fb950" stroke-width="1" rx="3"/>
  <text x="135" y="124" text-anchor="middle" font-family="monospace" font-size="8" fill="#3fb950">Node 2</text>
  <text x="135" y="138" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">kubelet</text>

  <rect x="180" y="110" width="70" height="36" fill="#161b22" stroke="#3fb950" stroke-width="1" rx="3"/>
  <text x="215" y="124" text-anchor="middle" font-family="monospace" font-size="8" fill="#3fb950">Node 3</text>
  <text x="215" y="138" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">kubelet</text>

  <!-- Command section -->
  <text x="290" y="52" font-family="monospace" font-size="12" fill="#3fb950">$ kubectl get pods -n kube-system</text>
  <text x="290" y="70" font-family="monospace" font-size="10" fill="#8b949e">NAME                        STATUS</text>
  <text x="290" y="86" font-family="monospace" font-size="10" fill="#58a6ff">kube-apiserver-node1        Running</text>
  <text x="290" y="100" font-family="monospace" font-size="10" fill="#58a6ff">etcd-node1                  Running</text>
  <text x="290" y="114" font-family="monospace" font-size="10" fill="#58a6ff">kube-scheduler-node1        Running</text>
  <text x="290" y="128" font-family="monospace" font-size="10" fill="#58a6ff">kube-controller-manager     Running</text>
  <text x="290" y="148" font-family="monospace" font-size="9" fill="#8b949e" opacity="0.6">← all control plane pods</text>
</svg>
