<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" rx="12"/>

  <!-- Steps -->
  <rect x="60" y="60" width="520" height="54" fill="#161b22" stroke="#3fb950" stroke-width="1" rx="4"/>
  <text x="80" y="83" font-family="monospace" font-size="12" fill="#3fb950">1.</text>
  <text x="100" y="83" font-family="monospace" font-size="12" fill="#8b949e">Hetzner Server (Ubuntu 22.04, 8GB RAM)</text>
  <text x="80" y="102" font-family="monospace" font-size="11" fill="#8b949e" opacity="0.6">ssh root@YOUR_IP</text>

  <line x1="320" y1="114" x2="320" y2="134" stroke="#30363d" stroke-width="1.5"/>

  <rect x="60" y="134" width="520" height="54" fill="#161b22" stroke="#58a6ff" stroke-width="1" rx="4"/>
  <text x="80" y="157" font-family="monospace" font-size="12" fill="#58a6ff">2.</text>
  <text x="100" y="157" font-family="monospace" font-size="12" fill="#8b949e">Install k0s + kubectl + Helm</text>
  <text x="80" y="176" font-family="monospace" font-size="11" fill="#8b949e" opacity="0.6">curl https://get.k0s.sh | sh</text>

  <line x1="320" y1="188" x2="320" y2="208" stroke="#30363d" stroke-width="1.5"/>

  <rect x="60" y="208" width="520" height="54" fill="#161b22" stroke="#f0883e" stroke-width="1" rx="4"/>
  <text x="80" y="231" font-family="monospace" font-size="12" fill="#f0883e">3.</text>
  <text x="100" y="231" font-family="monospace" font-size="12" fill="#8b949e">Deploy k0rdent via Helm</text>
  <text x="80" y="250" font-family="monospace" font-size="11" fill="#8b949e" opacity="0.6">helm install kcm oci://ghcr.io/k0rdent/kcm/charts/kcm --version 1.8.0</text>

  <line x1="320" y1="262" x2="320" y2="282" stroke="#30363d" stroke-width="1.5"/>

  <rect x="180" y="282" width="280" height="34" fill="#238636" fill-opacity="0.3" stroke="#3fb950" stroke-width="1.5" rx="4"/>
  <text x="320" y="303" text-anchor="middle" font-family="monospace" font-size="12" fill="#3fb950">Management Cluster Ready!</text>

  <text x="320" y="345" text-anchor="middle" font-family="monospace" font-size="13" fill="#58a6ff" fill-opacity="0.8">Setting Up the Management Cluster</text>
</svg>
