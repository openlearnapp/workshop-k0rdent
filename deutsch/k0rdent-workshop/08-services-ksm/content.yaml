          - "k0rdent State Manager"
          - "KSM (k0rdent State Manager)"
        labels: ["Quiz"]
      - q: "Wie verknüpfst du einen Service mit einem bestimmten Cluster in k0rdent?"
        type: select
        options:
          - text: "Direkt ein Helm-Release auf dem Child-Cluster erstellen"
          - text: "Die serviceTemplate-Referenz zum serviceSpec des ClusterDeployments hinzufügen"
