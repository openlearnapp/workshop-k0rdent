          - text: "Ein ServiceTemplate mit dem Cluster-Namen in den Metadaten erstellen"
        labels: ["Quiz"]
      - q: "Welche Source-Typen können ServiceTemplates verwenden? (Mehrfachauswahl)"
        type: multiple-choice
        options:
          - text: "HelmRepository"
            correct: true
          - text: "GitRepository"
            correct: true
          - text: "ConfigMap (rohe Ressourcen)"
            correct: true
          - text: "Terraform-State-Dateien"
        labels: ["Quiz"]
