<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
<style>
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes floatUD { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
  @keyframes floatUD2 { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-4px); } }
  @keyframes pulseGlow { 0%,100% { opacity:1; filter: drop-shadow(0 0 2px currentColor); } 50% { opacity:0.7; filter: drop-shadow(0 0 8px currentColor); } }
  @keyframes slideInL { from { opacity:0; transform: translateX(-20px); } to { opacity:1; transform: translateX(0); } }
  @keyframes slideInR { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
  @keyframes slideInU { from { opacity:0; transform: translateY(15px); } to { opacity:1; transform: translateY(0); } }
  @keyframes dashFlow { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
  @keyframes scaleIn { from { opacity:0; transform: scale(0.85); } to { opacity:1; transform: scale(1); } }
  @keyframes shimmer { 0%,100% { opacity:0.6; } 50% { opacity:1; } }

  svg { animation: fadeIn 0.8s ease-out both; }

  /* Kubernetes wheel rotation */
  .k8s-wheel, [id*="wheel"], [id*="k8s"] {
    transform-origin: center center;
    animation: spinSlow 12s linear infinite;
  }

  /* Container boxes float */
  .container-box { animation: floatUD 3s ease-in-out infinite; }
  .container-box:nth-child(2) { animation-delay: 0.5s; }
  .container-box:nth-child(3) { animation-delay: 1s; }
  .container-box:nth-child(4) { animation-delay: 1.5s; }

  /* Node circles pulse */
  .node-circle { animation: pulseGlow 2.5s ease-in-out infinite; }

  /* Arrows animate */
  .flow-arrow { stroke-dasharray: 8 4; animation: dashFlow 1.5s linear infinite; }

  /* Section headers slide in */
  .section-title { animation: slideInL 0.6s ease-out 0.3s both; }

  /* Status items appear sequentially */
  .status-item { animation: slideInU 0.5s ease-out both; }
  .status-item:nth-child(1) { animation-delay: 0.1s; }
  .status-item:nth-child(2) { animation-delay: 0.2s; }
  .status-item:nth-child(3) { animation-delay: 0.3s; }
  .status-item:nth-child(4) { animation-delay: 0.4s; }
  .status-item:nth-child(5) { animation-delay: 0.5s; }

  /* Terminal cursor blink */
  .cursor { animation: blink 1s step-end infinite; }

  /* Badges scale in */
  .badge { animation: scaleIn 0.4s ease-out both; }

  /* Labels shimmer */
  .label-text { animation: shimmer 3s ease-in-out infinite; }
</style>
  <rect width="640" height="160" fill="#0d1117" rx="10" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="638" height="28" rx="10" fill="#161b22"/>
  <rect x="1" y="20" width="638" height="9" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#f0883e" opacity="0.8"/>
  <circle cx="50" cy="14" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="320" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Was ist ein Container?</text>

  <!-- VM box (left) -->
  <rect x="24" y="44" width="130" height="102" fill="#161b22" stroke="#f85149" stroke-width="1" rx="4"/>
  <text x="89" y="58" text-anchor="middle" font-family="monospace" font-size="9" fill="#f85149">Virtuelle Maschine</text>
  <rect x="34" y="64" width="110" height="18" fill="#21262d" rx="2"/>
  <text x="89" y="76" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Gast-OS (4 GB)</text>
  <rect x="34" y="86" width="110" height="14" fill="#21262d" rx="2"/>
  <text x="89" y="96" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Hypervisor</text>
  <rect x="34" y="104" width="110" height="14" fill="#21262d" rx="2"/>
  <text x="89" y="114" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Host-OS</text>
  <text x="89" y="138" text-anchor="middle" font-family="monospace" font-size="8" fill="#f85149">Schwer · Minuten</text>

  <!-- Arrow -->
  <text x="180" y="96" text-anchor="middle" font-family="monospace" font-size="18" fill="#30363d">→</text>

  <!-- Container box (right) -->
  <rect x="200" y="44" width="200" height="102" fill="#161b22" stroke="#3fb950" stroke-width="1" rx="4"/>
  <text x="300" y="58" text-anchor="middle" font-family="monospace" font-size="9" fill="#3fb950">Container</text>
  <rect x="210" y="64" width="55" height="30" fill="#1f6feb" class="container-box" rx="2" opacity="0.8"/>
  <text x="237" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="white">nginx</text>
  <rect x="275" y="64" width="55" height="30" fill="#238636" class="container-box" rx="2" opacity="0.8"/>
  <text x="302" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="white">app</text>
  <rect x="340" y="64" width="50" height="30" fill="#b56800" class="container-box" rx="2" opacity="0.8"/>
  <text x="365" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="white">db</text>
  <rect x="210" y="98" width="180" height="14" fill="#21262d" rx="2"/>
  <text x="300" y="108" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Gemeinsamer Host-OS-Kernel</text>
  <text x="300" y="138" text-anchor="middle" font-family="monospace" font-size="8" fill="#3fb950">Leicht · Sekunden</text>

  <!-- Command -->
  <text x="440" y="60" font-family="monospace" font-size="12" fill="#3fb950">$ docker run nginx</text>
  <text x="440" y="80" font-family="monospace" font-size="10" fill="#8b949e">Image nicht lokal gefunden</text>
  <text x="440" y="96" font-family="monospace" font-size="10" fill="#8b949e">Lade nginx herunter...</text>
  <text x="440" y="112" font-family="monospace" font-size="10" fill="#58a6ff">Status: Heruntergeladen</text>
  <text x="440" y="128" font-family="monospace" font-size="10" fill="#3fb950">✓ Container gestartet</text>
</svg>
