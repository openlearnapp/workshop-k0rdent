<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" rx="12"/>

  <!-- Ship hull -->
  <rect x="120" y="220" width="400" height="60" fill="#161b22" stroke="#30363d" stroke-width="1.5" rx="4"/>
  <polygon points="120,220 80,280 560,280 520,220" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

  <!-- Containers on ship -->
  <rect x="145" y="170" width="70" height="52" fill="#1f6feb" stroke="#58a6ff" stroke-width="1" rx="2"/>
  <text x="180" y="200" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff">nginx</text>

  <rect x="225" y="170" width="70" height="52" fill="#238636" stroke="#3fb950" stroke-width="1" rx="2"/>
  <text x="260" y="200" text-anchor="middle" font-family="monospace" font-size="9" fill="#3fb950">app</text>

  <rect x="305" y="170" width="70" height="52" fill="#b56800" stroke="#f0883e" stroke-width="1" rx="2"/>
  <text x="340" y="200" text-anchor="middle" font-family="monospace" font-size="9" fill="#f0883e">db</text>

  <rect x="385" y="170" width="70" height="52" fill="#1f6feb" stroke="#58a6ff" stroke-width="1" rx="2"/>
  <text x="420" y="200" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff">redis</text>

  <!-- Kubernetes wheel -->
  <circle cx="320" cy="120" r="36" fill="none" stroke="#58a6ff" stroke-width="2"/>
  <circle cx="320" cy="120" r="10" fill="#58a6ff"/>
  <line x1="320" y1="84" x2="320" y2="100" stroke="#58a6ff" stroke-width="2"/>
  <line x1="320" y1="140" x2="320" y2="156" stroke="#58a6ff" stroke-width="2"/>
  <line x1="284" y1="120" x2="300" y2="120" stroke="#58a6ff" stroke-width="2"/>
  <line x1="340" y1="120" x2="356" y2="120" stroke="#58a6ff" stroke-width="2"/>
  <line x1="295" y1="95" x2="306" y2="106" stroke="#58a6ff" stroke-width="2"/>
  <line x1="334" y1="134" x2="345" y2="145" stroke="#58a6ff" stroke-width="2"/>
  <line x1="345" y1="95" x2="334" y2="106" stroke="#58a6ff" stroke-width="2"/>
  <line x1="306" y1="134" x2="295" y2="145" stroke="#58a6ff" stroke-width="2"/>

  <!-- Water -->
  <path d="M 60 290 Q 100 280 140 290 Q 180 300 220 290 Q 260 280 300 290 Q 340 300 380 290 Q 420 280 460 290 Q 500 300 540 290 Q 580 280 600 285 L 600 340 L 60 340 Z" fill="#0d2340" opacity="0.8"/>

  <text x="320" y="340" text-anchor="middle" font-family="monospace" font-size="13" fill="#58a6ff" fill-opacity="0.8">Container &amp; Kubernetes — Warum?</text>
</svg>
