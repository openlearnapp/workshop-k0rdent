<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <rect width="640" height="160" fill="#0d1117" rx="10" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="638" height="28" rx="10" fill="#161b22"/>
  <rect x="1" y="20" width="638" height="9" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#f0883e" opacity="0.8"/>
  <circle cx="50" cy="14" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="320" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Was ist Kubernetes?</text>

  <!-- Harbour master (center) -->
  <circle cx="320" cy="95" r="28" fill="#1f6feb" fill-opacity="0.2" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="320" y="91" text-anchor="middle" font-family="monospace" font-size="8" fill="#58a6ff">K8s</text>
  <text x="320" y="104" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">Hafenmeister</text>

  <!-- Ships/nodes around -->
  <rect x="60" y="60" width="65" height="40" fill="#161b22" stroke="#3fb950" stroke-width="1" rx="3"/>
  <text x="92" y="77" text-anchor="middle" font-family="monospace" font-size="7" fill="#3fb950">Node 1</text>
  <text x="92" y="91" text-anchor="middle" font-family="monospace" font-size="6" fill="#8b949e">3 Pods</text>
  <line x1="125" y1="80" x2="292" y2="88" stroke="#30363d" stroke-width="1" stroke-dasharray="4,2"/>

  <rect x="515" y="60" width="65" height="40" fill="#161b22" stroke="#3fb950" stroke-width="1" rx="3"/>
  <text x="547" y="77" text-anchor="middle" font-family="monospace" font-size="7" fill="#3fb950">Node 2</text>
  <text x="547" y="91" text-anchor="middle" font-family="monospace" font-size="6" fill="#8b949e">2 Pods</text>
  <line x1="515" y1="80" x2="348" y2="88" stroke="#30363d" stroke-width="1" stroke-dasharray="4,2"/>

  <rect x="200" y="130" width="65" height="22" fill="#161b22" stroke="#f0883e" stroke-width="1" rx="3"/>
  <text x="232" y="144" text-anchor="middle" font-family="monospace" font-size="7" fill="#f0883e">Crashed Pod</text>
  <line x1="232" y1="130" x2="310" y2="116" stroke="#f0883e" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="260" y="126" font-family="monospace" font-size="7" fill="#3fb950">↺ Neustart</text>

  <!-- Features list -->
  <text x="430" y="50" font-family="monospace" font-size="9" fill="#58a6ff">Kubernetes erledigt:</text>
  <text x="430" y="66" font-family="monospace" font-size="8" fill="#8b949e">• Scheduling</text>
  <text x="430" y="80" font-family="monospace" font-size="8" fill="#8b949e">• Selbstheilung</text>
  <text x="430" y="94" font-family="monospace" font-size="8" fill="#8b949e">• Skalierung</text>
  <text x="430" y="108" font-family="monospace" font-size="8" fill="#8b949e">• Load Balancing</text>
  <text x="430" y="122" font-family="monospace" font-size="8" fill="#8b949e">• Rolling Updates</text>
</svg>
