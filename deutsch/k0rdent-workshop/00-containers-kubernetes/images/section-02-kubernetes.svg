<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
<style>
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes floatUD { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
  @keyframes floatUD2 { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-4px); } }
  @keyframes pulseGlow { 0%,100% { opacity:1; filter: drop-shadow(0 0 2px currentColor); } 50% { opacity:0.7; filter: drop-shadow(0 0 8px currentColor); } }
  @keyframes slideInL { from { opacity:0; transform: translateX(-20px); } to { opacity:1; transform: translateX(0); } }
  @keyframes slideInR { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
  @keyframes slideInU { from { opacity:0; transform: translateY(15px); } to { opacity:1; transform: translateY(0); } }
  @keyframes dashFlow { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
  @keyframes scaleIn { from { opacity:0; transform: scale(0.85); } to { opacity:1; transform: scale(1); } }
  @keyframes shimmer { 0%,100% { opacity:0.6; } 50% { opacity:1; } }

  svg { animation: fadeIn 0.8s ease-out both; }

  /* Kubernetes wheel rotation */
  .k8s-wheel, [id*="wheel"], [id*="k8s"] {
    transform-origin: center center;
    animation: spinSlow 12s linear infinite;
  }

  /* Container boxes float */
  .container-box { animation: floatUD 3s ease-in-out infinite; }
  .container-box:nth-child(2) { animation-delay: 0.5s; }
  .container-box:nth-child(3) { animation-delay: 1s; }
  .container-box:nth-child(4) { animation-delay: 1.5s; }

  /* Node circles pulse */
  .node-circle { animation: pulseGlow 2.5s ease-in-out infinite; }

  /* Arrows animate */
  .flow-arrow { stroke-dasharray: 8 4; animation: dashFlow 1.5s linear infinite; }

  /* Section headers slide in */
  .section-title { animation: slideInL 0.6s ease-out 0.3s both; }

  /* Status items appear sequentially */
  .status-item { animation: slideInU 0.5s ease-out both; }
  .status-item:nth-child(1) { animation-delay: 0.1s; }
  .status-item:nth-child(2) { animation-delay: 0.2s; }
  .status-item:nth-child(3) { animation-delay: 0.3s; }
  .status-item:nth-child(4) { animation-delay: 0.4s; }
  .status-item:nth-child(5) { animation-delay: 0.5s; }

  /* Terminal cursor blink */
  .cursor { animation: blink 1s step-end infinite; }

  /* Badges scale in */
  .badge { animation: scaleIn 0.4s ease-out both; }

  /* Labels shimmer */
  .label-text { animation: shimmer 3s ease-in-out infinite; }
</style>
  <rect width="640" height="160" fill="#0d1117" rx="10" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="638" height="28" rx="10" fill="#161b22"/>
  <rect x="1" y="20" width="638" height="9" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#f0883e" opacity="0.8"/>
  <circle cx="50" cy="14" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="320" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Was ist Kubernetes?</text>

  <!-- Harbour master (center) -->
  <circle cx="320" cy="95" r="28" fill="#1f6feb" class="container-box" fill-opacity="0.2" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="320" y="91" text-anchor="middle" font-family="monospace" font-size="8" fill="#58a6ff">K8s</text>
  <text x="320" y="104" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">Hafenmeister</text>

  <!-- Ships/nodes around -->
  <rect x="60" y="60" width="65" height="40" fill="#161b22" stroke="#3fb950" stroke-width="1" rx="3"/>
  <text x="92" y="77" text-anchor="middle" font-family="monospace" font-size="7" fill="#3fb950">Node 1</text>
  <text x="92" y="91" text-anchor="middle" font-family="monospace" font-size="6" fill="#8b949e">3 Pods</text>
  <g class="flow-arrow"><line x1="125" y1="80" x2="292" y2="88" stroke="#30363d" stroke-width="1" stroke-dasharray="4,2"/></g>

  <rect x="515" y="60" width="65" height="40" fill="#161b22" stroke="#3fb950" stroke-width="1" rx="3"/>
  <text x="547" y="77" text-anchor="middle" font-family="monospace" font-size="7" fill="#3fb950">Node 2</text>
  <text x="547" y="91" text-anchor="middle" font-family="monospace" font-size="6" fill="#8b949e">2 Pods</text>
  <g class="flow-arrow"><line x1="515" y1="80" x2="348" y2="88" stroke="#30363d" stroke-width="1" stroke-dasharray="4,2"/></g>

  <rect x="200" y="130" width="65" height="22" fill="#161b22" stroke="#f0883e" stroke-width="1" rx="3"/>
  <text x="232" y="144" text-anchor="middle" font-family="monospace" font-size="7" fill="#f0883e">Crashed Pod</text>
  <g class="flow-arrow"><line x1="232" y1="130" x2="310" y2="116" stroke="#f0883e" stroke-width="1" stroke-dasharray="3,2"/></g>
  <text x="260" y="126" font-family="monospace" font-size="7" fill="#3fb950">↺ Neustart</text>

  <!-- Features list -->
  <text x="430" y="50" font-family="monospace" font-size="9" fill="#58a6ff">Kubernetes erledigt:</text>
  <text x="430" y="66" font-family="monospace" font-size="8" fill="#8b949e">• Scheduling</text>
  <text x="430" y="80" font-family="monospace" font-size="8" fill="#8b949e">• Selbstheilung</text>
  <text x="430" y="94" font-family="monospace" font-size="8" fill="#8b949e">• Skalierung</text>
  <text x="430" y="108" font-family="monospace" font-size="8" fill="#8b949e">• Load Balancing</text>
  <text x="430" y="122" font-family="monospace" font-size="8" fill="#8b949e">• Rolling Updates</text>
</svg>
