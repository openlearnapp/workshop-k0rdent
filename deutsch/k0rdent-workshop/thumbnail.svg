<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect x="240" y="80" width="800" height="640" fill="white" fill-opacity="0.04" rx="32"/>

  <!-- Management Cluster (center) -->
  <circle cx="640" cy="320" r="90" fill="url(#glow)" stroke="#58a6ff" stroke-width="2"/>
  <text x="640" y="314" text-anchor="middle" font-family="monospace" font-size="16" fill="#58a6ff" font-weight="bold">Management</text>
  <text x="640" y="336" text-anchor="middle" font-family="monospace" font-size="14" fill="#8b949e">Cluster</text>

  <!-- Connector lines to child clusters -->
  <line x1="570" y1="270" x2="430" y2="180" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="710" y1="270" x2="850" y2="180" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="570" y1="370" x2="430" y2="460" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="710" y1="370" x2="850" y2="460" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Child clusters -->
  <circle cx="390" cy="150" r="52" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="390" y="144" text-anchor="middle" font-family="monospace" font-size="11" fill="#3fb950">dev-01</text>
  <text x="390" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">k0s</text>

  <circle cx="890" cy="150" r="52" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="890" y="144" text-anchor="middle" font-family="monospace" font-size="11" fill="#3fb950">prod-01</text>
  <text x="890" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">k0s</text>

  <circle cx="390" cy="490" r="52" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="390" y="484" text-anchor="middle" font-family="monospace" font-size="11" fill="#f0883e">staging</text>
  <text x="390" y="500" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">k0s</text>

  <circle cx="890" cy="490" r="52" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="890" y="484" text-anchor="middle" font-family="monospace" font-size="11" fill="#f0883e">edge-01</text>
  <text x="890" y="500" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">k0s</text>

  <!-- Title -->
  <text x="640" y="600" text-anchor="middle" font-family="system-ui,sans-serif" font-size="64" font-weight="700" fill="#58a6ff">k0rdent Workshop</text>
  <text x="640" y="660" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" fill="#8b949e">Kubernetes Cluster Management</text>
  <text x="640" y="710" text-anchor="middle" font-family="monospace" font-size="20" fill="#3fb950">12 Lektionen · Open Learn</text>
</svg>
