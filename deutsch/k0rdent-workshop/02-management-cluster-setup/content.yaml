          - "helm install kcm oci://ghcr.io/k0rdent/kcm/charts/kcm --version 1.8.0 -n kcm-system --create-namespace"
          - "helm install kcm oci://ghcr.io/k0rdent/kcm/charts/kcm --version 1.8.0"
        labels: ["Quiz"]
      - q: "Was macht das Flag --enable-worker bei der Installation von k0s?"
        type: select
        options:
          - text: "Es aktiviert das Kubernetes-Dashboard"
          - text: "Es lässt den Control-Plane-Node auch als Worker agieren, sodass Pods darauf eingeplant werden können"
            correct: true
          - text: "Es aktiviert den High-Availability-Modus"
          - text: "Es deaktiviert alle Sicherheitsrichtlinien"
        labels: ["Quiz"]
      - q: "Welche Tools müssen vor k0rdent installiert werden? (Mehrfachauswahl)"
        type: multiple-choice
        options:
          - text: "k0s (Kubernetes)"
            correct: true
          - text: "kubectl"
            correct: true
          - text: "Helm"
            correct: true
          - text: "Docker Desktop"
        labels: ["Quiz"]
