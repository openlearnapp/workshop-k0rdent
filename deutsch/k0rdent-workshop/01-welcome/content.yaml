          - text: "Ein CI/CD-Pipeline-Tool"
        labels: ["Quiz"]
      - q: "Welche dieser organisatorischen Rollen gibt es in k0rdent? (Mehrfachauswahl)"
        type: multiple-choice
        options:
          - text: "Platform Architect — erstellt wiederverwendbare Templates"
