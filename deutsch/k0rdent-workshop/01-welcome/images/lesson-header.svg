  <text x="160" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">k0s</text>

  <circle cx="480" cy="60" r="38" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="480" y="56" text-anchor="middle" font-family="monospace" font-size="9" fill="#3fb950">prod</text>
  <text x="480" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">k0s</text>

  <circle cx="120" cy="255" r="38" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="120" y="251" text-anchor="middle" font-family="monospace" font-size="9" fill="#f0883e">staging</text>
  <text x="120" y="265" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">k0s</text>

