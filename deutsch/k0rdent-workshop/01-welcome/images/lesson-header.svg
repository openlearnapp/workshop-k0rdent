  <line x1="250" y1="190" x2="150" y2="230" stroke="#30363d" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="390" y1="190" x2="490" y2="230" stroke="#30363d" stroke-width="1.5" stroke-dasharray="5,3"/>

