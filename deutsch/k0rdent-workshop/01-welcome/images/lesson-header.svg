  <text x="320" y="162" text-anchor="middle" font-family="monospace" font-size="14" fill="#58a6ff" font-weight="bold">k0rdent</text>
  <text x="320" y="180" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Management</text>

