<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <rect width="640" height="160" fill="#0d1117" rx="10" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="638" height="28" rx="10" fill="#161b22"/>
  <rect x="1" y="20" width="638" height="9" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#f0883e" opacity="0.8"/>
  <circle cx="50" cy="14" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="320" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Warum k0rdent?</text>
  <text x="20" y="52" font-family="monospace" font-size="9" fill="#58a6ff">1. Anwendungskomplexität</text>
  <text x="20" y="66" font-family="monospace" font-size="8" fill="#8b949e">KI/ML, Microservices → schnelles Deployment</text>
  <text x="20" y="86" font-family="monospace" font-size="9" fill="#58a6ff">2. Platform Engineering</text>
  <text x="20" y="100" font-family="monospace" font-size="8" fill="#8b949e">IDPs → Entwicklerproduktivität steigern</text>
  <text x="340" y="52" font-family="monospace" font-size="9" fill="#58a6ff">3. Verteilte Infrastruktur</text>
  <text x="340" y="66" font-family="monospace" font-size="8" fill="#8b949e">Multi-Cloud, Edge, Compliance</text>
  <text x="340" y="86" font-family="monospace" font-size="9" fill="#58a6ff">4. Open Source</text>
  <text x="340" y="100" font-family="monospace" font-size="8" fill="#8b949e">CAPI, Flux, Sveltos, Velero</text>
  <rect x="20" y="112" width="600" height="34" fill="#161b22" rx="4"/>
  <text x="320" y="133" text-anchor="middle" font-family="monospace" font-size="9" fill="#3fb950">k0rdent vereint bewährte Open-Source-Tools in einem Framework</text>
</svg>
