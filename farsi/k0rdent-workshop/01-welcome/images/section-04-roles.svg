<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <rect width="640" height="160" fill="#0d1117" rx="10" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="638" height="28" rx="10" fill="#161b22"/>
  <rect x="1" y="20" width="638" height="9" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#f0883e" opacity="0.8"/>
  <circle cx="50" cy="14" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="320" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Organizational Roles</text>

  <!-- Role 1 -->
  <rect x="20" y="38" width="180" height="108" fill="#161b22" stroke="#bc8cff" stroke-width="1.5" rx="4"/>
  <text x="110" y="56" text-anchor="middle" font-family="monospace" font-size="10" fill="#bc8cff" font-weight="bold">Platform Architect</text>
  <text x="110" y="74" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Designs platforms</text>
  <text x="110" y="88" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Creates templates</text>
  <text x="110" y="102" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Abstract blueprints</text>
  <text x="110" y="130" text-anchor="middle" font-family="monospace" font-size="8" fill="#bc8cff">Highest level</text>

  <!-- Role 2 -->
  <rect x="230" y="38" width="180" height="108" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" rx="4"/>
  <text x="320" y="56" text-anchor="middle" font-family="monospace" font-size="10" fill="#58a6ff" font-weight="bold">Platform Lead</text>
  <text x="320" y="74" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Manages credentials</text>
  <text x="320" y="88" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Configures access</text>
  <text x="320" y="102" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Adapts templates</text>
  <text x="320" y="130" text-anchor="middle" font-family="monospace" font-size="8" fill="#58a6ff">Sees secrets</text>

  <!-- Role 3 -->
  <rect x="440" y="38" width="180" height="108" fill="#161b22" stroke="#3fb950" stroke-width="1.5" rx="4"/>
  <text x="530" y="56" text-anchor="middle" font-family="monospace" font-size="10" fill="#3fb950" font-weight="bold">Platform Engineer</text>
  <text x="530" y="74" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Deploys clusters</text>
  <text x="530" y="88" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Uses templates</text>
  <text x="530" y="102" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Day-to-day ops</text>
  <text x="530" y="130" text-anchor="middle" font-family="monospace" font-size="8" fill="#3fb950">No secret access</text>
</svg>
