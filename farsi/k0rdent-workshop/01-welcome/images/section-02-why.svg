<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <rect width="640" height="160" fill="#0d1117" rx="10" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="638" height="28" rx="10" fill="#161b22"/>
  <rect x="1" y="20" width="638" height="9" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#f0883e" opacity="0.8"/>
  <circle cx="50" cy="14" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="320" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Why k0rdent?</text>

  <rect x="20" y="40" width="140" height="32" fill="#161b22" stroke="#f0883e" stroke-width="1" rx="3"/>
  <text x="90" y="56" text-anchor="middle" font-family="monospace" font-size="9" fill="#f0883e">1. App Complexity</text>
  <text x="90" y="68" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">AI/ML · Microservices</text>

  <rect x="170" y="40" width="140" height="32" fill="#161b22" stroke="#58a6ff" stroke-width="1" rx="3"/>
  <text x="240" y="56" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff">2. Platform Eng.</text>
  <text x="240" y="68" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">IDP · Dev Productivity</text>

  <rect x="320" y="40" width="140" height="32" fill="#161b22" stroke="#3fb950" stroke-width="1" rx="3"/>
  <text x="390" y="56" text-anchor="middle" font-family="monospace" font-size="9" fill="#3fb950">3. Distributed Infra</text>
  <text x="390" y="68" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Multi-cloud · Edge</text>

  <rect x="470" y="40" width="148" height="32" fill="#161b22" stroke="#bc8cff" stroke-width="1" rx="3"/>
  <text x="544" y="56" text-anchor="middle" font-family="monospace" font-size="9" fill="#bc8cff">4. Open Source</text>
  <text x="544" y="68" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">No vendor lock-in</text>

  <!-- Arrows pointing down to k0rdent -->
  <line x1="90" y1="72" x2="200" y2="108" stroke="#30363d" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="240" y1="72" x2="270" y2="108" stroke="#30363d" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="390" y1="72" x2="360" y2="108" stroke="#30363d" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="544" y1="72" x2="430" y2="108" stroke="#30363d" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- k0rdent at bottom -->
  <rect x="180" y="108" width="280" height="36" fill="#1f6feb" fill-opacity="0.2" stroke="#58a6ff" stroke-width="1.5" rx="4"/>
  <text x="320" y="124" text-anchor="middle" font-family="monospace" font-size="12" fill="#58a6ff" font-weight="bold">k0rdent</text>
  <text x="320" y="138" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">unified multi-cluster management platform</text>
</svg>
