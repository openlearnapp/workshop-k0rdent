  <text x="390" y="180" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">k0s</text>

  <circle cx="890" cy="170" r="52" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="890" y="164" text-anchor="middle" font-family="monospace" font-size="11" fill="#3fb950">prod-01</text>
  <text x="890" y="180" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">k0s</text>

  <circle cx="390" cy="510" r="52" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="390" y="504" text-anchor="middle" font-family="monospace" font-size="11" fill="#f0883e">staging</text>
  <text x="390" y="520" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">k0s</text>

  <circle cx="890" cy="510" r="52" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="890" y="504" text-anchor="middle" font-family="monospace" font-size="11" fill="#f0883e">edge-01</text>
  <text x="890" y="520" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">k0s</text>

