<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect x="240" y="80" width="800" height="640" fill="white" fill-opacity="0.04" rx="32"/>

  <!-- Management Cluster (center) -->
  <circle cx="640" cy="340" r="90" fill="url(#glow)" stroke="#58a6ff" stroke-width="2"/>
