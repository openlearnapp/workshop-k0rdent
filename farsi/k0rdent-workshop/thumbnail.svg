  <line x1="710" y1="290" x2="850" y2="200" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="570" y1="390" x2="430" y2="480" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="710" y1="390" x2="850" y2="480" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Child clusters -->
  <circle cx="390" cy="170" r="52" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
