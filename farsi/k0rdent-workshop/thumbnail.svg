  <text x="640" y="620" text-anchor="middle" font-family="system-ui,sans-serif" font-size="72" font-weight="700" fill="#58a6ff">k0rdent</text>
  <text x="640" y="680" text-anchor="middle" font-family="system-ui,sans-serif" font-size="36" fill="#8b949e">Workshop</text>
