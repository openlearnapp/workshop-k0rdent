<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <rect width="640" height="160" fill="#0d1117" rx="10" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="638" height="28" rx="10" fill="#161b22"/>
  <rect x="1" y="20" width="638" height="9" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#f0883e" opacity="0.8"/>
  <circle cx="50" cy="14" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="320" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Cluster Lifecycle — Knowledge Check</text>
  <!-- Lifecycle circle -->
  <circle cx="180" cy="95" r="50" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="180" y="60" text-anchor="middle" font-family="monospace" font-size="9" fill="#3fb950">Create</text>
  <text x="225" y="100" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff">Update</text>
  <text x="180" y="140" text-anchor="middle" font-family="monospace" font-size="9" fill="#f85149">Delete</text>
  <text x="135" y="100" text-anchor="middle" font-family="monospace" font-size="9" fill="#f0883e">Adopt</text>
  <!-- Drift indicator -->
  <rect x="360" y="50" width="240" height="30" fill="#1f2937" stroke="#f0883e" stroke-width="1" rx="3"/>
  <text x="480" y="70" text-anchor="middle" font-family="monospace" font-size="9" fill="#f0883e">Drift Detected: spec ≠ actual state</text>
  <rect x="360" y="90" width="240" height="30" fill="#1f2937" stroke="#3fb950" stroke-width="1" rx="3"/>
  <text x="480" y="110" text-anchor="middle" font-family="monospace" font-size="9" fill="#3fb950">Template Chains → valid upgrade paths</text>
  <text x="320" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff" opacity="0.5">$ kubectl patch clusterdeployment → update template → rolling upgrade</text>
</svg>
