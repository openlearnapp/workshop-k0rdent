<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <rect width="640" height="160" fill="#0d1117" rx="10" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="638" height="28" rx="10" fill="#161b22"/>
  <rect x="1" y="20" width="638" height="9" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#f0883e" opacity="0.8"/>
  <circle cx="50" cy="14" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="320" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Install kubectl</text>
  <text x="24" y="55" font-family="monospace" font-size="12" fill="#3fb950">$ sudo apt-get install -y kubectl</text>
  <text x="24" y="76" font-family="monospace" font-size="11" fill="#8b949e">Setting up kubectl (1.31.0) ...</text>
  <text x="24" y="96" font-family="monospace" font-size="11" fill="#58a6ff">$ export KUBECONFIG=./KUBECONFIG</text>
  <text x="24" y="116" font-family="monospace" font-size="11" fill="#3fb950">$ kubectl get nodes   →   Ready</text>
</svg>
