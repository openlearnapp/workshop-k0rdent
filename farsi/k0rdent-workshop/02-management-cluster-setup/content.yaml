          - "helm install kcm oci://ghcr.io/k0rdent/kcm/charts/kcm --version 1.8.0"
        labels: ["Quiz"]
      - q: "flag --enable-worker هنگام نصب k0s چه کاری انجام می‌دهد؟"
        type: select
        options:
          - text: "Kubernetes dashboard را فعال می‌کند"
          - text: "node control plane را وادار می‌کند به عنوان worker هم عمل کند تا pod ها روی آن برنامه‌ریزی شوند"
            correct: true
          - text: "حالت high availability را فعال می‌کند"
          - text: "همه سیاست‌های امنیتی را غیرفعال می‌کند"
        labels: ["Quiz"]
      - q: "کدام ابزارها باید قبل از k0rdent نصب شوند؟ (چند گزینه)"
        type: multiple-choice
        options:
          - text: "k0s (Kubernetes)"
