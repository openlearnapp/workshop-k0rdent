<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <rect width="640" height="160" fill="#0d1117" rx="10" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="638" height="28" rx="10" fill="#161b22"/>
  <rect x="1" y="20" width="638" height="9" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#f0883e" opacity="0.8"/>
  <circle cx="50" cy="14" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="320" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">MultiCluster &amp; Hosted — Knowledge Check</text>
  <!-- MultiClusterService fan out -->
  <rect x="30" y="55" width="130" height="30" fill="#161b22" stroke="#58a6ff" stroke-width="1" rx="3"/>
  <text x="95" y="75" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff">MultiClusterService</text>
  <!-- Fan lines -->
  <line x1="160" y1="70" x2="210" y2="55" stroke="#3fb950" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="160" y1="70" x2="210" y2="70" stroke="#3fb950" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="160" y1="70" x2="210" y2="85" stroke="#3fb950" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="225" cy="55" r="12" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="225" y="59" text-anchor="middle" font-family="monospace" font-size="8" fill="#3fb950">C1</text>
  <circle cx="225" cy="70" r="12" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="225" y="74" text-anchor="middle" font-family="monospace" font-size="8" fill="#3fb950">C2</text>
  <circle cx="225" cy="85" r="12" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="225" y="89" text-anchor="middle" font-family="monospace" font-size="8" fill="#3fb950">C3</text>
  <text x="260" y="75" font-family="monospace" font-size="8" fill="#8b949e">matched by label selector</text>
  <!-- Hosted vs Standalone -->
  <rect x="380" y="45" width="110" height="50" fill="#161b22" stroke="#58a6ff" stroke-width="1" rx="3"/>
  <text x="435" y="60" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Standalone</text>
  <text x="435" y="74" text-anchor="middle" font-family="monospace" font-size="8" fill="#58a6ff">dedicated nodes</text>
  <text x="435" y="87" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">fully independent</text>
  <rect x="510" y="45" width="110" height="50" fill="#161b22" stroke="#f0883e" stroke-width="1" rx="3"/>
  <text x="565" y="60" text-anchor="middle" font-family="monospace" font-size="9" fill="#f0883e">Hosted CP</text>
  <text x="565" y="74" text-anchor="middle" font-family="monospace" font-size="8" fill="#f0883e">pods in mgmt</text>
  <text x="565" y="87" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">lower cost</text>
  <text x="320" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff" opacity="0.5">$ kubectl get multiclusterservice -A → services across all matching clusters</text>
</svg>
