<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <rect width="640" height="160" fill="#0d1117" rx="10" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="638" height="28" rx="10" fill="#161b22"/>
  <rect x="1" y="20" width="638" height="9" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#f0883e" opacity="0.8"/>
  <circle cx="50" cy="14" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="320" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Credentials &amp; Access — Knowledge Check</text>
  <!-- Lock icon -->
  <rect x="70" y="55" width="40" height="32" fill="none" stroke="#58a6ff" stroke-width="2" rx="3"/>
  <path d="M 78 55 Q 78 42 90 42 Q 102 42 102 55" fill="none" stroke="#58a6ff" stroke-width="2"/>
  <circle cx="90" cy="71" r="5" fill="#58a6ff" opacity="0.8"/>
  <text x="150" y="68" font-family="monospace" font-size="10" fill="#58a6ff">SSH Key → Kubernetes Secret</text>
  <text x="150" y="85" font-family="monospace" font-size="10" fill="#8b949e">→ Credential CRD</text>
  <!-- Role pyramid -->
  <text x="380" y="55" font-family="monospace" font-size="9" fill="#f0883e">Platform Architect (templates)</text>
  <text x="380" y="72" font-family="monospace" font-size="9" fill="#f0883e">Platform Lead (credentials)</text>
  <text x="380" y="89" font-family="monospace" font-size="9" fill="#3fb950">Platform Engineer (deploy)</text>
  <!-- AccessManagement label -->
  <rect x="380" y="100" width="220" height="22" fill="#161b22" stroke="#58a6ff" stroke-width="1" rx="3"/>
  <text x="490" y="115" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff">AccessManagement → RBAC per namespace</text>
  <text x="320" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff" opacity="0.5">$ kubectl get credential -n kcm-system → credential ready</text>
</svg>
