<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <rect width="640" height="160" fill="#0d1117" rx="10" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="638" height="28" rx="10" fill="#161b22"/>
  <rect x="1" y="20" width="638" height="9" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#f0883e" opacity="0.8"/>
  <circle cx="50" cy="14" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="320" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">k0rdent — Super Control Plane</text>

  <!-- Management cluster center -->
  <circle cx="130" cy="96" r="36" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="130" y="92" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff" font-weight="bold">k0rdent</text>
  <text x="130" y="106" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">mgmt</text>

  <!-- Child clusters -->
  <line x1="166" y1="78" x2="210" y2="58" stroke="#30363d" stroke-width="1" stroke-dasharray="4,2"/>
  <circle cx="228" cy="52" r="22" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="228" y="56" text-anchor="middle" font-family="monospace" font-size="8" fill="#3fb950">dev</text>

  <line x1="166" y1="96" x2="210" y2="96" stroke="#30363d" stroke-width="1" stroke-dasharray="4,2"/>
  <circle cx="232" cy="96" r="22" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="232" y="100" text-anchor="middle" font-family="monospace" font-size="8" fill="#3fb950">prod</text>

  <line x1="166" y1="114" x2="210" y2="134" stroke="#30363d" stroke-width="1" stroke-dasharray="4,2"/>
  <circle cx="228" cy="140" r="22" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="228" y="144" text-anchor="middle" font-family="monospace" font-size="8" fill="#f0883e">edge</text>

  <!-- kubectl output -->
  <text x="280" y="48" font-family="monospace" font-size="11" fill="#3fb950">$ kubectl get clusterdeployments -A</text>
  <text x="280" y="65" font-family="monospace" font-size="10" fill="#8b949e">NAMESPACE  NAME     READY  AGE</text>
  <text x="280" y="81" font-family="monospace" font-size="10" fill="#58a6ff">k0rdent    dev-01   True   1h</text>
  <text x="280" y="97" font-family="monospace" font-size="10" fill="#58a6ff">k0rdent    prod-01  True   2d</text>
  <text x="280" y="113" font-family="monospace" font-size="10" fill="#58a6ff">k0rdent    edge-01  True   3h</text>
  <text x="280" y="135" font-family="monospace" font-size="9" fill="#8b949e">KCM  |  KSM  |  KOF</text>
  <text x="280" y="150" font-family="monospace" font-size="9" fill="#58a6ff">Cluster Manager · State Manager · Observability</text>
</svg>
