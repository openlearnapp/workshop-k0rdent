version: 2
number: 12
title: "النسخ الاحتياطي والاستعادة والمراقبة"
description: "احمِ Cluster الإدارة بنسخ احتياطية Velero وراقب الـ Cluster مع KOF."
image: "images/lesson-header.svg"
image_caption: "درع النسخ الاحتياطي لـ Velero + مراقبة KOF — حماية بنيتك التحتية على k0rdent"

sections:
  - title: "أهمية النسخ الاحتياطي"
    image: "images/section-01-why-backup.svg"
    image_caption: "Cluster الإدارة في المركز — إذا فشل، تُفقد القدرة على إدارة جميع Cluster الأطفال"
    explanation: |
      Cluster الإدارة هو **قلب بنيتك التحتية**. إذا فشل، ستفقد القدرة على إدارة جميع Cluster الأطفال. قدرات النسخ الاحتياطي والاستعادة ضرورية لأغراض:

      - **التعافي من الكوارث** — الاستعادة على Cluster إدارة جديد
      - **التراجع** — التعافي من الترقيات الفاشلة
      - **الترحيل** — نقل الإدارة إلى بنية تحتية مختلفة

      تدمج k0rdent **Velero** مباشرةً في Helm chart الخاص بها لعمليات النسخ الاحتياطي.
    examples:
      - q: "لماذا يُعدّ النسخ الاحتياطي لـ Cluster الإدارة أمراً بالغ الأهمية؟"
        a: "يتحكم Cluster الإدارة في جميع Cluster الأطفال. فقدانه يعني فقدان القدرة على إدارة البنية التحتية بالكامل."
        labels: ["Backup", "k0rdent"]
        rel:
          - ["Velero", "أداة مفتوحة المصدر للنسخ الاحتياطي واستعادة Cluster Kubernetes"]
          - ["Disaster Recovery", "استعادة الإدارة على Cluster جديد بعد الفشل"]

      - type: select
        q: "ما الأداة التي تستخدمها k0rdent للنسخ الاحتياطي والاستعادة؟"
        options:
          - text: "etcdctl"
          - text: "Velero"
            correct: true
          - text: "Kasten K10"
          - text: "Restic standalone"
        labels: ["Quiz"]

  - title: "معمارية النسخ الاحتياطي"
    image: "images/section-02-architecture.svg"
    image_caption: "k0rdent تُجدول، Velero تُنفّذ — ما الذي يُنسخ احتياطياً وما الذي لا يُنسخ"
    explanation: |
      يتميز نظام النسخ الاحتياطي في k0rdent بتوزيع واضح للمسؤوليات:

      | المكوّن | المسؤولية |
      |-----------|---------------|
      | **k0rdent** | الجدولة، تحديد ما يجب نسخه احتياطياً |
      | **Velero** | تنفيذ النسخ الاحتياطية، إدارة التخزين |

      **ما الذي يُنسخ احتياطياً:**
      - جميع كائنات إعداد k0rdent (CRDs والقوالب وبيانات الاعتماد)
      - تعريفات ClusterDeployment
      - إعدادات الخدمات
      - قواعد RBAC وإدارة الوصول

      **ما الذي لا يُنسخ احتياطياً:**
      - أحمال عمل Cluster الأطفال (هذه مستقلة)
      - موارد موفّر السحابة نفسها
    examples:
      - q: "ما الذي يُنسخ احتياطياً في نسخة k0rdent الاحتياطية لـ Cluster الإدارة؟"
        a: "جميع كائنات إعداد k0rdent: CRDs والقوالب وبيانات الاعتماد وClusterDeployments وإعدادات الخدمات وقواعد RBAC."
        labels: ["Backup", "k0rdent"]

      - type: select
        q: "هل تُضمَّن أحمال عمل Cluster الأطفال في النسخ الاحتياطية للإدارة؟"
        options:
          - text: "نعم — كل شيء يُنسخ احتياطياً"
          - text: "لا — يُنسخ احتياطياً فقط إعداد Cluster الإدارة"
            correct: true
          - text: "فقط إذا تمت إعدادها بشكل صريح"
        labels: ["Quiz"]

  - title: "التحضير للنسخ الاحتياطي"
    image: "images/section-03-prepare.svg"
    image_caption: "Secret بيانات اعتماد Velero + إعداد تخزين متوافق مع S3"
    explanation: |
      قبل تفعيل النسخ الاحتياطي، أعدّ وجهة تخزين لـ Velero:

      1. **اختر موفّر تخزين** — تخزين متوافق مع S3 (AWS S3 أو MinIO أو Hetzner Object Storage وغيرها)
      2. **أنشئ بيانات اعتماد التخزين** — مفتاح الوصول والسر للتخزين
      3. **أعدّ Velero** — عبر قيم Helm الخاصة بـ k0rdent

      بالنسبة لـ Hetzner، يمكنك استخدام **Hetzner Object Storage** (متوافق مع S3):
      ```bash
      # إنشاء Secret بيانات اعتماد Velero
      kubectl create secret generic velero-credentials \
        -n kcm-system \
        --from-literal=aws='[default]
      aws_access_key_id=YOUR_ACCESS_KEY
      aws_secret_access_key=YOUR_SECRET_KEY'
      ```
    examples:
      - q: "ما خيارات التخزين التي تعمل مع نظام النسخ الاحتياطي لـ k0rdent؟"
        a: "أي تخزين متوافق مع S3: AWS S3 وMinIO وHetzner Object Storage وغيرها."
        labels: ["Backup", "k0rdent"]
        rel:
          - ["S3-compatible storage", "تخزين الكائنات مع توافق AWS S3 API"]
          - ["Hetzner Object Storage", "تخزين كائنات متوافق مع S3 من Hetzner"]

  - title: "النسخ الاحتياطية المجدولة وعند الطلب"
    image: "images/section-04-schedule.svg"
    image_caption: "CRD لـ ManagementBackup: مجدولة (cron) أو عند الطلب (spec فارغة)"
    explanation: |
      تدعم k0rdent نمطَين للنسخ الاحتياطي عبر CRD اسمه `ManagementBackup`:

      **النسخ الاحتياطية المجدولة:**
      ```yaml
      apiVersion: k0rdent.mirantis.com/v1beta1
      kind: ManagementBackup
      metadata:
        name: daily-backup
        namespace: kcm-system
      spec:
        schedule: "0 2 * * *"  # يومياً الساعة 2 صباحاً
      ```

      **النسخ الاحتياطية عند الطلب:**
      ```yaml
      apiVersion: k0rdent.mirantis.com/v1beta1
      kind: ManagementBackup
      metadata:
        name: pre-upgrade-backup
        namespace: kcm-system
      spec: {}
      ```

      تطبيق بـ `kubectl apply -f backup.yaml`.

      **أفضل الممارسات:** أنشئ دائماً نسخة احتياطية قبل ترقية k0rdent أو إجراء تغييرات جوهرية.
    examples:
      - q: "كيف تُنشئ نسخة احتياطية يومية الساعة 2 صباحاً؟"
        a: 'اضبط spec.schedule على تعبير cron: "0 2 * * *" في كائن ManagementBackup.'
        labels: ["Backup", "k0rdent"]
        rel:
          - ["ManagementBackup", "CRD لإعداد عمليات النسخ الاحتياطي"]

      - type: input
        q: "ما CRD المستخدم لنسخ k0rdent الاحتياطية؟"
        a:
          - "ManagementBackup"
        labels: ["Quiz"]

  - title: "الاستعادة من نسخة احتياطية"
    image: "images/section-05-restore.svg"
    image_caption: "velero backup get ← velero restore create — إعادة الاتصال بـ Cluster الأطفال الموجودة"
    explanation: |
      تُعيد الاستعادة إنشاء كائنات إعداد k0rdent من نسخة احتياطية **دون إعادة تهيئة** موارد السحابة:

      **الخطوات:**
      1. ثبّت Cluster إدارة جديداً مع k0rdent
      2. أعدّ Velero للوصول إلى تخزين النسخ الاحتياطية
      3. سرد النسخ الاحتياطية المتاحة:
         ```bash
         velero backup get
         ```
      4. الاستعادة من نسخة احتياطية محددة:
         ```bash
         velero restore create --from-backup <backup-name>
         ```

      **مهم:** تُعيد الاستعادة توصيل k0rdent بـ Cluster الأطفال الموجودة. بما أن موارد السحابة لا تزال موجودة، تُوفّق k0rdent وتستأنف الإدارة.
    examples:
      - q: "هل تُعيد الاستعادة من نسخة احتياطية تهيئة Cluster الأطفال؟"
        a: "لا — تُعيد الاستعادة إنشاء كائنات الإعداد. تُعيد k0rdent الاتصال بالـ Cluster الموجودة دون إعادة تهيئتها."
        labels: ["Backup", "k0rdent"]

      - type: select
        q: "بعد الاستعادة على Cluster إدارة جديد، ماذا يحدث لـ Cluster الأطفال الموجودة؟"
        options:
          - text: "تُحذف وتُعاد إنشاؤها"
          - text: "تُعيد k0rdent الاتصال بها وتستأنف إدارتها"
            correct: true
          - text: "تصبح غير مُدارة بشكل دائم"
          - text: "يجب استيعابها يدوياً من جديد"
        labels: ["Quiz"]

  - title: "KOF — المراقبة وإدارة التكاليف"
    image: "images/section-06-kof.svg"
    image_caption: "KOF: جامع OpenTelemetry ← لوحات Grafana + التنبيهات + إدارة التكاليف"
    explanation: |
      يوفّر **KOF (k0rdent Observability & FinOps)** مراقبة على مستوى المؤسسات:

      **المعمارية:**
      - مبني على **OpenTelemetry** للمقاييس والسجلات والتتبع الموحد
      - جمع مركزي للبيانات من جميع الـ Cluster المُدارة
      - لوحات **Grafana** للتصور
      - إدارة التنبيهات عبر قواعد قابلة للإعداد

      **الميزات الرئيسية:**
      - مراقبة صحة الـ Cluster
      - تتبع استخدام الموارد
      - إدارة التكاليف وFinOps
      - تجميع السجلات
      - التتبع الموزع
      - دعم تعدد المستأجرين

      **التثبيت:**
      يُثبَّت KOF بشكل منفصل عن KCM وله Helm chart خاص به. يمكن نشره على Cluster الإدارة أو Cluster مراقبة مخصص.
    examples:
      - q: "ما هو KOF؟"
        a: "k0rdent Observability & FinOps — مراقبة على مستوى المؤسسات مبنية على OpenTelemetry مع لوحات Grafana والتنبيهات وإدارة التكاليف."
        labels: ["k0rdent", "Basics"]
        rel:
          - ["KOF", "k0rdent Observability & FinOps للمراقبة وإدارة التكاليف"]
          - ["OpenTelemetry", "إطار مراقبة موحد للمقاييس والسجلات والتتبع"]
          - ["Grafana", "منصة التصور ولوحات المعلومات مفتوحة المصدر"]

      - type: multiple-choice
        q: "ما الذي يوفّره KOF؟ (اختر كل ما ينطبق)"
        options:
          - text: "جمع مركزي للمقاييس"
            correct: true
          - text: "تهيئة الـ Cluster"
          - text: "لوحات Grafana"
            correct: true
          - text: "إدارة التنبيهات"
            correct: true
          - text: "إدارة التكاليف / FinOps"
            correct: true
        labels: ["Quiz"]

  - title: "إلغاء تثبيت k0rdent"
    image: "images/section-07-uninstall.svg"
    image_caption: "ترتيب الإلغاء: حذف ClusterDeployments ← Management ← helm uninstall ← حذف مساحة الاسم"
    explanation: |
      إذا احتجت إلى التنظيف، اتبع هذا الترتيب بدقة:

      ```bash
      # 1. احذف جميع ClusterDeployments أولاً
      kubectl delete clusterdeployments --all -n kcm-system

      # 2. انتظر حتى يتم إلغاء تهيئة Cluster الأطفال بالكامل
      kubectl get clusters.cluster.x-k8s.io -n kcm-system --watch

      # 3. احذف كائن Management
      kubectl delete management.k0rdent kcm

      # 4. أزل إصدار Helm
      helm uninstall kcm -n kcm-system

      # 5. احذف مساحة الاسم
      kubectl delete ns kcm-system
      ```

      **مهم:** اتبع هذا الترتيب! حذف إصدار Helm قبل إزالة ClusterDeployments قد يترك موارد سحابية متروكة.
    examples:
      - q: "لماذا يجب حذف ClusterDeployments قبل إلغاء تثبيت Helm chart؟"
        a: "حذف Helm chart أولاً يُزيل وحدات التحكم التي تُنظّف موارد السحابة، مما يترك أجهزة افتراضية وبنية تحتية متروكة."
        labels: ["k0rdent", "CLI"]

      - type: select
        q: "ما ترتيب الإلغاء الصحيح؟"
        options:
          - text: "helm uninstall ← حذف مساحة الاسم ← حذف ClusterDeployments"
          - text: "حذف ClusterDeployments ← حذف Management ← helm uninstall ← حذف مساحة الاسم"
            correct: true
          - text: "حذف مساحة الاسم ← يُنظَّف كل شيء تلقائياً"
          - text: "kubectl delete all --all ← helm uninstall"
        labels: ["Quiz"]

  - title: "ملخص ورشة العمل"
