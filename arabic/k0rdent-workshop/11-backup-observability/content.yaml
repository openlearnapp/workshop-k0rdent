    image_caption: "12 درساً مكتملاً — من الحاويات إلى إدارة Cluster متعددة مع k0rdent"
    explanation: |
      مبروك! لقد أتممت ورشة عمل k0rdent. إليك ما تعلمته:

      | الدرس | الموضوع |
      |--------|-------|
      | 1 | مفاهيم k0rdent ومعماريته |
      | 2 | إعداد Cluster إدارة على Hetzner |
      | 3 | التحقق من التثبيت |
      | 4 | نظام القوالب (قوالب Cluster/الخدمة/الموفّر) |
      | 5 | بيانات الاعتماد وإدارة الوصول |
      | 6 | نشر الـ Cluster عبر SSH/Remote |
      | 7 | إدارة دورة حياة الـ Cluster |
      | 8 | العمل مع الخدمات (KSM) |
      | 9 | الخدمات متعددة الـ Cluster وصفحات التحكم المُستضافة |
      | 10 | إنشاء قوالب مخصصة |
      | 11 | النسخ الاحتياطي والاستعادة والمراقبة |

      **الخطوات التالية:**
      - استعرض [توثيق k0rdent](https://docs.k0rdent.io/v1.8.0/) للتعمق أكثر
      - جرّب النشر على موفّرين آخرين (AWS وAzure وGCP)
      - أعدّ KOF للمراقبة الكاملة
      - ابنِ قوالب مخصصة لمؤسستك
      - انضم إلى مجتمع k0rdent
    examples:
