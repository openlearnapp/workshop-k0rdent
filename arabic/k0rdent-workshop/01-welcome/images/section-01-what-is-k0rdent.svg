<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <rect width="640" height="160" fill="#0d1117" rx="10" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="638" height="28" rx="10" fill="#161b22"/>
  <rect x="1" y="20" width="638" height="9" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#f0883e" opacity="0.8"/>
  <circle cx="50" cy="14" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="320" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">What is k0rdent?</text>

  <!-- k0rdent center box -->
  <rect x="20" y="40" width="160" height="106" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" rx="4"/>
  <text x="100" y="60" text-anchor="middle" font-family="monospace" font-size="14" fill="#58a6ff" font-weight="bold">k0rdent</text>
  <text x="100" y="76" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Cluster API (CAPI)</text>
  <text x="100" y="90" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Flux (GitOps)</text>
  <text x="100" y="104" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Sveltos (Services)</text>
  <text x="100" y="118" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">k0smotron (k0s)</text>
  <text x="100" y="132" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">Velero (Backup)</text>

  <!-- Arrow -->
  <text x="198" y="98" text-anchor="middle" font-family="monospace" font-size="16" fill="#30363d">→</text>

  <!-- Benefits -->
  <text x="220" y="52" font-family="monospace" font-size="11" fill="#3fb950">✓ Provision clusters anywhere</text>
  <text x="220" y="70" font-family="monospace" font-size="11" fill="#3fb950">✓ Template-driven deployments</text>
  <text x="220" y="88" font-family="monospace" font-size="11" fill="#3fb950">✓ Centralized service management</text>
  <text x="220" y="106" font-family="monospace" font-size="11" fill="#3fb950">✓ No manual glue code needed</text>
  <text x="220" y="124" font-family="monospace" font-size="11" fill="#3fb950">✓ Vendor-independent open source</text>
  <text x="220" y="142" font-family="monospace" font-size="9" fill="#58a6ff">Built on proven open-source tools</text>
</svg>
