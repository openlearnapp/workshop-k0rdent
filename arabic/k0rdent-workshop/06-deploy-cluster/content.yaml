        type: input
        a:
          - "In a Secret named <cluster-name>-kubeconfig"
          - "A Secret named <cluster-name>-kubeconfig"
          - "In a Kubernetes Secret"
        labels: ["Quiz"]
      - q: "ما وظيفة حقل dryRun في ClusterDeployment؟"
        type: select
        options:
          - text: "يُنشئ الـ Cluster في بيئة اختبار"
          - text: "يتحقق من الإعداد دون تهيئة موارد حقيقية"
            correct: true
          - text: "ينشر Cluster بعقدة واحدة فقط"
          - text: "يُشغّل فحوصات الصحة على الـ Cluster الموجودة"
        labels: ["Quiz"]
      - q: "أي من هذه مطلوبة في spec لـ ClusterDeployment؟ (اختر كل ما ينطبق)"
        type: multiple-choice
        options:
          - text: "template — الـ ClusterTemplate المراد استخدامه"
            correct: true
          - text: "credential — الـ Credential للمصادقة"
            correct: true
          - text: "dryRun — مطلوب دائماً"
          - text: "config — المعاملات الخاصة بالقالب"
            correct: true
        labels: ["Quiz"]
