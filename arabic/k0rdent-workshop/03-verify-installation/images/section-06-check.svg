<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <rect width="640" height="160" fill="#0d1117" rx="10" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="638" height="28" rx="10" fill="#161b22"/>
  <rect x="1" y="20" width="638" height="9" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#f0883e" opacity="0.8"/>
  <circle cx="50" cy="14" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="320" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Verify Installation — Knowledge Check</text>
  <!-- verification steps -->
  <text x="50" y="60" font-family="monospace" font-size="10" fill="#8b949e">$ kubectl get pods -n kcm-system</text>
  <text x="50" y="78" font-family="monospace" font-size="10" fill="#3fb950">~26 Running pods ✓</text>
  <text x="50" y="100" font-family="monospace" font-size="10" fill="#8b949e">$ kubectl get management -n kcm-system</text>
  <text x="50" y="118" font-family="monospace" font-size="10" fill="#3fb950">kcm    True    kcm-1-8-0 ✓</text>
  <!-- question mark for quiz -->
  <circle cx="550" cy="90" r="28" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.6"/>
  <text x="550" y="98" text-anchor="middle" font-family="monospace" font-size="28" fill="#58a6ff" opacity="0.7">?</text>
  <text x="320" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff" opacity="0.5">$ kubectl get management → READY: True = all systems operational</text>
</svg>
