<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <rect width="640" height="160" fill="#0d1117" rx="10" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="1" y="1" width="638" height="28" rx="10" fill="#161b22"/>
  <rect x="1" y="20" width="638" height="9" fill="#161b22"/>
  <circle cx="18" cy="14" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#f0883e" opacity="0.8"/>
  <circle cx="50" cy="14" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="320" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Templating System — Knowledge Check</text>
  <!-- Three template boxes -->
  <rect x="50" y="45" width="130" height="40" fill="#161b22" stroke="#58a6ff" stroke-width="1" rx="4"/>
  <text x="115" y="63" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff">ClusterTemplate</text>
  <text x="115" y="78" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">cluster infra</text>
  <rect x="255" y="45" width="130" height="40" fill="#161b22" stroke="#3fb950" stroke-width="1" rx="4"/>
  <text x="320" y="63" text-anchor="middle" font-family="monospace" font-size="9" fill="#3fb950">ServiceTemplate</text>
  <text x="320" y="78" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">apps &amp; services</text>
  <rect x="460" y="45" width="130" height="40" fill="#161b22" stroke="#f0883e" stroke-width="1" rx="4"/>
  <text x="525" y="63" text-anchor="middle" font-family="monospace" font-size="9" fill="#f0883e">ProviderTemplate</text>
  <text x="525" y="78" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">CAPI providers</text>
  <!-- Immutable badge -->
  <rect x="200" y="105" width="240" height="30" fill="#1f2937" stroke="#f0883e" stroke-width="1" rx="4"/>
  <text x="320" y="125" text-anchor="middle" font-family="monospace" font-size="10" fill="#f0883e">IMMUTABLE — cannot be edited after creation</text>
  <text x="320" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#58a6ff" opacity="0.5">$ kubectl get clustertemplate -n kcm-system → VALID: true</text>
</svg>
