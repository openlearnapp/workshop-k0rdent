<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoadingвҖҰ вҖ“ Open Learn Workshop</title>
  <style>
    :root { --accent: #2563eb; --accent-hover: #1d4ed8; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 640px; margin: 0 auto; padding: 40px 20px 60px; color: var(--text); line-height: 1.6; }

    .top-bar { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .lang-picker { display: flex; gap: 0.35rem; flex-wrap: wrap; flex-shrink: 0; }
    .lang-btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; background: white; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; gap: 4px; }
    .lang-btn:hover { border-color: var(--accent); }
    .lang-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    h1 { font-size: 1.5rem; margin: 0; }
    .description { color: var(--muted); margin-bottom: 0.75rem; }
    .labels { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 1.25rem; }
    .badge { display: inline-block; font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 10px; background: #eff6ff; color: var(--accent); }

    .cta { margin-bottom: 2rem; }
    .cta a { display: inline-block; padding: 10px 28px; background: var(--accent); color: white; text-decoration: none; border-radius: 8px; font-weight: 600; }
    .cta a:hover { background: var(--accent-hover); }

    h2 { font-size: 1.1rem; margin: 1.75rem 0 0.5rem; padding-bottom: 0.35rem; border-bottom: 1px solid var(--border); }
    ol, ul { padding-left: 1.5rem; margin: 0.5rem 0; }
    li { margin: 0.25rem 0; }

    #changelog h1, #changelog h2 { font-size: 1.05rem; margin: 1.5rem 0 0.4rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--border); }
    #changelog ul { padding-left: 1.25rem; }
    #changelog li { font-size: 0.85rem; color: #475569; }

    footer { margin-top: 2.5rem; padding-top: 1rem; border-top: 1px solid var(--border); text-align: center; font-size: 0.8rem; color: #94a3b8; }
    footer a { color: var(--muted); }
    .loading { text-align: center; padding: 2rem; color: var(--muted); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked@15/lib/marked.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
</head>
<body>
  <div class="top-bar">
    <div id="lang-picker"></div>
    <h1 id="title"></h1>
  </div>
  <div id="header"></div>
  <div id="content" class="loading">LoadingвҖҰ</div>
  <div id="changelog"></div>
  <footer>
    <a id="gh-link" href="#">GitHub</a> В· Powered by <a href="https://open-learn.app">Open Learn</a>
  </footer>

  <script>
    const FLAGS = {
      'deutsch':'рҹҮ©рҹҮӘ','english':'рҹҮ¬рҹҮ§','farsi':'рҹҮ®рҹҮ·','ЩҒШ§ШұШіЫҢ':'рҹҮ®рҹҮ·',
      'franГ§ais':'рҹҮ«рҹҮ·','espaГұol':'рҹҮӘрҹҮё','italiano':'рҹҮ®рҹҮ№','portuguГӘs':'рҹҮөрҹҮ№',
      'polski':'рҹҮөрҹҮұ','tГјrkГ§e':'рҹҮ№рҹҮ·','Ш§Щ„Ш№ШұШЁЩҠШ©':'рҹҮёрҹҮҰ','дёӯж–Ү':'рҹҮЁрҹҮі',
      'ж—Ҙжң¬иӘһ':'рҹҮҜрҹҮө','н•ңкөӯм–ҙ':'рҹҮ°рҹҮ·','аӨ№аӨҝаӨЁаҘҚаӨҰаҘҖ':'рҹҮ®рҹҮі','СғРәСҖР°С—РҪСҒСҢРәР°':'рҹҮәрҹҮҰ',
      'arabic':'рҹҮёрҹҮҰ'
    }

    const path = location.pathname.replace(/\/$/, '')
    const workshopName = path.split('/').pop() || 'workshop'
    const baseUrl = location.origin + path
    const sourceUrl = baseUrl + '/index.yaml'
    const addUrl = `https://open-learn.app/#/add?source=${encodeURIComponent(sourceUrl)}`
    const ghUrl = `https://github.com/openlearnapp/${workshopName}`

    document.getElementById('gh-link').href = ghUrl

    // Per-language data: { lang: { ws: workshops.yaml entry, lessons: [{title, number}] } }
    let langData = {}

    async function fetchYaml(url) {
      try {
        const r = await fetch(url)
        return r.ok ? jsyaml.load(await r.text()) : null
      } catch { return null }
    }

    function updateForLanguage(lang) {
      const d = langData[lang]
      if (!d) return

      document.querySelectorAll('.lang-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.lang === lang)
      )

      const ws = d.ws
      const title = ws.title || workshopName
      document.title = title + ' вҖ“ Open Learn Workshop'

      // Title in top bar
      document.getElementById('title').textContent = title

      // Header: description + labels
      let headerHtml = ''
      if (ws.description) headerHtml += `<p class="description">${ws.description}</p>`
      if (ws.labels?.length) {
        headerHtml += `<div class="labels">${ws.labels.map(l => `<span class="badge">${l}</span>`).join('')}</div>`
      }
      headerHtml += `<div class="cta"><a href="${addUrl}">Add Workshop to Open Learn</a></div>`
      document.getElementById('header').innerHTML = headerHtml

      // Lesson list
      let html = ''
      if (d.lessons.length > 0) {
        html += `<h2>${d.lessons.length} Lessons</h2><ol>`
        for (const l of d.lessons) {
          html += `<li><strong>${l.title}</strong></li>`
        }
        html += '</ol>'
      }
      document.getElementById('content').innerHTML = html
    }

    async function render() {
      const [indexData, changelogText] = await Promise.all([
        fetchYaml('index.yaml'),
        fetch('CHANGELOG.md').then(r => r.ok ? r.text() : null).catch(() => null)
      ])

      const languages = (indexData?.languages || []).map(l => typeof l === 'string' ? l : l.folder)

      // Load workshop metadata + lesson titles for each language in parallel
      await Promise.all(languages.map(async lang => {
        const wsYaml = await fetchYaml(`${lang}/workshops.yaml`) || await fetchYaml(`${lang}/topics.yaml`)
        const ws = (wsYaml?.workshops || wsYaml?.topics || [])[0] || {}
        const wsFolder = ws.folder || workshopName

        // Load lessons list
        const lessonsYaml = await fetchYaml(`${lang}/${wsFolder}/lessons.yaml`)
        const lessonFolders = lessonsYaml?.lessons || []

        // Load lesson titles in parallel
        const lessons = await Promise.all(lessonFolders.map(async folder => {
          const content = await fetchYaml(`${lang}/${wsFolder}/${folder}/content.yaml`)
          return { title: content?.title || folder, number: content?.number || 0 }
        }))

        langData[lang] = { ws, lessons: lessons.sort((a, b) => a.number - b.number) }
      }))

      // Language picker
      const pickerEl = document.getElementById('lang-picker')
      pickerEl.className = 'lang-picker'
      for (const lang of languages) {
        const btn = document.createElement('button')
        btn.className = 'lang-btn'
        btn.dataset.lang = lang
        btn.textContent = `${FLAGS[lang] || 'рҹҢҗ'} ${lang}`
        btn.onclick = () => updateForLanguage(lang)
        pickerEl.appendChild(btn)
      }

      if (languages.length > 0) {
        updateForLanguage(languages[0])
      } else {
        document.getElementById('title').textContent = workshopName
        document.getElementById('content').innerHTML = ''
      }

      // Changelog
      if (changelogText) {
        document.getElementById('changelog').innerHTML = marked.parse(changelogText)
      }
    }

    render()
  </script>
</body>
</html>
